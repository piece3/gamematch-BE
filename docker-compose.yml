#docker 설정



services:
  db:
    image: postgres:16-alpine
    container_name: study-db
    environment:
      POSTGRES_USER: gamematch
      POSTGRES_PASSWORD: gamematch
      POSTGRES_DB: gamematch
    ports:
      -  "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  

 