name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gamematch
          POSTGRES_PASSWORD: gamematch
          POSTGRES_DB: gamematch_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gamematch -d gamematch_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg2://gamematch:gamematch@localhost:5432/gamematch_test
      TEST_DATABASE_URL: postgresql+psycopg2://gamematch:gamematch@localhost:5432/gamematch_test
      SECRET_KEY: ci-secret-key-that-is-at-least-32-characters
      EMAIL_DEV_MODE: "true"
      RIOT_API_KEY: test-riot-key

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        run: poetry install --no-interaction
      - name: Compile
        run: poetry run python -m compileall -q app alembic tests
      - name: Apply migrations
        run: poetry run alembic upgrade head
      - name: Verify migration alignment
        run: poetry run alembic check
      - name: Run tests
        run: poetry run pytest -q
